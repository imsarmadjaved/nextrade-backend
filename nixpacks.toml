[phases.setup]
cmds = [
    "apt-get update && apt-get install -y python3 python3-venv",
]

[phases.install]
cmds = [
    "npm ci",
    "python3 -m venv venv",
    ". venv/bin/activate && pip install --upgrade pip",
    ". venv/bin/activate && pip install -r requirements.txt",
]

[phases.build]
cmds = [
    "echo 'Build complete'",
]

[start]
cmd = "npm start"
