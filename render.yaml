# render.yaml
services:
  # Service 1: Node.js Backend API (Main Service)
  - type: web
    name: nextrade-backend
    env: node
    repo: https://github.com/sarmad153/nextrade-backend
    region: oregon
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PYTHON_SERVICE_1_URL
        value: https://nextrade-ai-service-1.onrender.com
      - key: PYTHON_SERVICE_2_URL
        value: https://nextrade-ai-service-2.onrender.com
      - key: FRONTEND_URL
        value: https://your-frontend.netlify.app

  # Service 2: Python AI Service 1
  - type: worker
    name: nextrade-ai-service-1
    env: python
    repo: https://github.com/sarmad153/nextrade-backend
    region: oregon
    branch: main
    buildCommand: cd ai_service && pip install -r requirements.txt
    startCommand: cd ai_service && python service1.py
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: PORT
        value: 5001

  # Service 3: Python AI Service 2
  - type: worker
    name: nextrade-ai-service-2
    env: python
    repo: https://github.com/sarmad153/nextrade-backend
    region: oregon
    branch: main
    buildCommand: cd ai_service && pip install -r requirements.txt
    startCommand: cd ai_service && python service2.py
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: PORT
        value: 5002
